# 外事主题分类配置
# 用于 filter_articles.py 的 AI 主题筛选

name: "外事"

# 核心判断标准（一句话，适用于所有类别）
principle: "外事活动本身必须是文章的主题和核心内容，而非文章中顺带提及的背景信息或细节。"

# 符合条件的类别
categories:
  - "在国际期刊发表论文：文章主体就是报道论文发表，期刊名通常出现在标题中"
  - "正式机构级互访或出访：代表团、校/院领导的正式访问，涉及签约、座谈、合作洽谈"
  - "国际会议：参加或主办国际学术会议的总结回顾，或论文被国际顶级会议录用、获奖"
  - "港澳台机构级合作：论坛、联盟活动、联合中心成立、联合发布报告等正式合作"
  - "国际项目合作：如联合科考、中外科教合作等"
  - "国际人才引进与荣誉：国际学者正式加盟，或获评国际学术组织的重要荣誉"

# 不属于外事的常见情况
exclusions:
  - "单场讲座/报告/工作坊：外国或港澳台学者来做的讲座和学术报告，无论预告还是回顾"
  - "预告和通知类：交换项目选拔通知、招生宣讲会、面试动员会等尚未发生的流程性通知"
  - "主题非外事的综合性文章：人物专访、年度成就总结、毕业指导等，只是顺带提到了国际论文或港澳合作"
  - "名义国际实质国内：会议名含'国际'但参与者主要是国内学者，或把国内机构误认为国外"
  - "非本校主体的活动：如部委领导在国际大会的演讲，与本校外事工作无关"
